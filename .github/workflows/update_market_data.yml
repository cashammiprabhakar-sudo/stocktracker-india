name: Update Market Data

on:
  # Runs weekdays at 6:15 PM IST (12:45 UTC) — after NSE/BSE close
  schedule:
    - cron: '45 12 * * 1-5'

  # Allow manual trigger from GitHub → Actions tab
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push market_data.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance firebase-admin --quiet

      - name: Fetch stock data
        run: python scripts/fetch_market_data.py
        env:
          # Paste your Firebase service account JSON as a GitHub secret named
          # FIREBASE_SERVICE_ACCOUNT (repo Settings → Secrets → Actions).
          # Without it the script falls back to the hardcoded symbol list.
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Commit and push market_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.json
          # Only commit if something actually changed
          git diff --staged --quiet || \
            git commit -m "chore: update market data $(date +'%Y-%m-%d') [skip ci]"
          git push
