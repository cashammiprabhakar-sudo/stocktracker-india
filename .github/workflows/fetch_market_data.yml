name: Refresh Market Data

on:
  schedule:
    # Runs at 8:00 AM IST (2:30 AM UTC) on weekdays — pre-market snapshot
    - cron: '30 2 * * 1-5'
    # Runs at 4:00 PM IST (10:30 AM UTC) on weekdays — end-of-day after NSE closes at 3:30 PM
    - cron: '30 10 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit market_data.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance firebase-admin requests

      - name: Fetch market data
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python scripts/fetch_market_data.py

      - name: Move market_data.json to public/
        run: |
          mv market_data.json public/market_data.json

      - name: Commit updated market data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/market_data.json
          git diff --staged --quiet || git commit -m "chore: refresh market data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: fnikar-stock-tracker
