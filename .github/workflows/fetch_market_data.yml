name: Refresh Market Data

on:
  schedule:
    # 4:00 PM IST (10:30 AM UTC) on weekdays — after NSE closes at 3:30 PM IST
    - cron: '30 10 * * 1-5'
    # 10:00 AM IST Saturday (4:30 AM UTC) — catch any missed weekday run
    - cron: '30 4 * * 6'
  workflow_dispatch:  # Manual trigger from GitHub Actions tab

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit market_data.json as backup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance firebase-admin requests

      - name: Fetch market data & write to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/fetch_market_data.py
        # The script does two things:
        # 1. Writes market_data.json (backup / fallback for the app)
        # 2. Writes sharedMarketData/{SYMBOL} documents to Firestore
        #    → Dashboard reads these on load → instant prices for all users

      - name: Commit market_data.json backup to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.json
          git diff --staged --quiet || git commit -m "chore: refresh market data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
