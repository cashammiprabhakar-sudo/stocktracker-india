name: Refresh Market Data

on:
  schedule:
    # Runs at 4:00 PM IST (10:30 AM UTC) on weekdays — end-of-day after NSE closes at 3:30 PM
    - cron: '30 10 * * 1-5'
    # Saturday 10:00 AM IST (4:30 AM UTC) — fallback in case any weekday run failed
    - cron: '30 4 * * 6'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance firebase-admin requests

      - name: Fetch market data
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python scripts/fetch_market_data.py

      - name: Commit updated market data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.json
          git diff --staged --quiet || git commit -m "chore: refresh market data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
