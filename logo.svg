<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c6b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2260;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c6b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="40" cy="40" r="34"/>
    </clipPath>
  </defs>

  <!-- Outer ring -->
  <circle cx="40" cy="40" r="37" fill="none" stroke="url(#ringGrad)" stroke-width="5"/>

  <!-- Inner background circle -->
  <circle cx="40" cy="40" r="32" fill="#0d1e4a" opacity="0.95"/>

  <!-- Stock chart zigzag line -->
  <polyline points="18,50 27,38 35,44 44,28 53,35 62,22"
    fill="none" stroke="url(#arrowGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#circleClip)"/>

  <!-- Chart nodes (dots) -->
  <circle cx="27" cy="38" r="2.2" fill="#00c6b8"/>
  <circle cx="44" cy="28" r="2.2" fill="#00c6b8"/>
  <circle cx="62" cy="22" r="2.2" fill="#00e5d4"/>

  <!-- Large diagonal arrow (↗) -->
  <line x1="30" y1="56" x2="56" y2="24" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" clip-path="url(#circleClip)"/>
  <!-- Arrow head -->
  <polyline points="47,22 57,23 56,33" fill="none" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#circleClip)"/>

  <!-- Small up arrow in bottom-right of circle -->
  <line x1="60" y1="55" x2="60" y2="47" stroke="#00c6b8" stroke-width="2" stroke-linecap="round" clip-path="url(#circleClip)"/>
  <polyline points="57,50 60,47 63,50" fill="none" stroke="#00c6b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#circleClip)"/>

  <!-- FNIKAR text -->
  <text x="88" y="38" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="24" fill="#0d2260" letter-spacing="2">FNIKAR</text>

  <!-- Subtitle text -->
  <text x="88" y="54" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="7.5" fill="#4a6080" letter-spacing="1.2">REAL-TIME PORTFOLIO TRACKING &amp; ANALYSIS</text>
</svg>
